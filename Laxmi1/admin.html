<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<nav>

<div class="logo">
<i class="fa-solid fa-building-columns"></i>
CollegeCare
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="complaint.html">Complaint</a>
<a href="track.html">Track</a>
<a href="admin.html">Admin</a>
</div>

</nav>

<div class="container">

<h1 style="text-align:center;">
📊 Admin Dashboard
</h1>

<br>

<div class="stats">

<div class="card">
<h2 id="total">0</h2>
<p>Total Complaints</p>
</div>

<div class="card">
<h2 id="pending">0</h2>
<p>Pending</p>
</div>

<div class="card">
<h2 id="resolved">0</h2>
<p>Resolved</p>
</div>

</div>

<h2 style="margin-top:30px;">
Complaint Records
</h2>

<table>

<thead>

<tr>
<th>Ticket</th>
<th>Name</th>
<th>Department</th>
<th>Issue</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

const complaints =
JSON.parse(
localStorage.getItem(
"complaints"
)
) || [];

document.getElementById(
"total"
).innerText =
complaints.length;

const pending =
complaints.filter(
c => c.status === "Pending"
).length;

document.getElementById(
"pending"
).innerText =
pending;

const resolved =
complaints.filter(
c => c.status === "Resolved"
).length;

document.getElementById(
"resolved"
).innerText =
resolved;

let rows = "";

complaints.forEach(c => {

rows += `

<tr>

<td>${c.ticket}</td>

<td>${c.name}</td>

<td>${c.dept}</td>

<td>${c.category}</td>

<td>${c.status}</td>

</tr>

`;

});

document.getElementById(
"tableBody"
).innerHTML = rows;

</script>

</body>
</html>
